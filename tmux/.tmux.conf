# Prefix: Ctrl+a (easier than default Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes with Ctrl+arrow
bind -n C-Left  resize-pane -L 5
bind -n C-Right resize-pane -R 5

# Mouse support
set -g mouse on
# Allow terminal (not tmux) to handle mouse selection for copy
unbind -T root MouseDrag1Pane
unbind -T copy-mode MouseDrag1Pane

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1

# Don't rename windows automatically
set-option -g allow-rename off

# 256 colors + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer
set -g history-limit 10000

# No delay on Escape key (important for vim/neovim)
set -sg escape-time 0

# Activity monitoring (flags sessions with new output)
set -g monitor-activity on
set -g visual-activity off

# Session switcher with rich preview
bind s choose-tree -Zs -F "#{b:pane_current_path} | #{pane_title} [#{pane_current_command}] #{?session_attached,#[fg=green]▶#[default],  }"

# Vi-style copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text " %I:%M%p %d-%b"

# Status bar
set -g status-left "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_gitmux}"
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 5

run '~/.tmux/plugins/tpm/tpm'

# Override after plugin load: plugin uses set -gq (not -ogq) for _text so it
# overwrites any pre-run value. Setting here ensures our command wins.
set -g @catppuccin_gitmux_text " #(cd #{pane_current_path} && git branch --show-current 2>/dev/null)"
